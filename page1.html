    // Particle effect
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    const particles = [];
    const numParticles = 50;

    function random(min, max) {
        return Math.random() * (max - min) + min;
    }

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = random(0, w);
            this.y = random(0, h);
            this.size = random(2, 5);
            this.speedY = random(0.2, 0.8);
            this.alpha = random(0.3, 0.8);
        }
        update() {
            this.y -= this.speedY;
            if (this.y < 0) this.reset();
        }
        draw() {
            ctx.fillStyle = `rgba(255, 215, 0, ${this.alpha})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < numParticles; i++) particles.push(new Particle());


   function animate() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}

    document.getElementById("particles").style.display = "none";

    // Clear container
    opponentsContainer.innerHTML = "";

    // Create opponent divs with click handlers
    opponents.forEach(op => {
        const div = document.createElement("div");
        div.className = "opponent";

        div.innerHTML = `
            <div class="img-wrapper">
                <img src="${op.img}" alt="${op.name}">
            </div>
            <div class="opponent-name">${op.name}</div>
            <div class="opponent-desc">${op.desc}</div>
        `;

       div.addEventListener("click", function () {
    playClick(); // 🔊 ADD THIS

    selectedOpponent = op.name;
    startSadGame();
});
        opponentsContainer.appendChild(div);
    });
});


// 💗 HEART PARTICLES (only runs when visible)
const heartCanvas = document.getElementById("heart-particles");
const hctx = heartCanvas.getContext("2d");

let hw = heartCanvas.width = window.innerWidth;
let hh = heartCanvas.height = window.innerHeight;

const kissImg = new Image();
kissImg.src = "kiss-particles.png";

let heartParticles = [];

for (let i = 0; i < 30; i++) {
    heartParticles.push({
        x: Math.random() * hw,
        y: Math.random() * hh,
        size: Math.random() * 60 + 60, // 💋 MUCH BIGGER
        speed: Math.random() * 1 + 0.5
    });
}

function animateHearts() {
    if (heartCanvas.style.display === "none") return;

    hctx.clearRect(0, 0, hw, hh);

    heartParticles.forEach(h => {
       hctx.drawImage(kissImg, h.x, h.y, h.size * 1.2, h.size);

        h.y += h.speed;

        if (h.y > hh) {
            h.y = -20;
            h.x = Math.random() * hw;
        }
    });

    requestAnimationFrame(animateHearts);
}

document.addEventListener("click", function(e) {
   if (e.target && e.target.id === "confirm-btn") {
    playClick(); // 🔊 ADD THIS
    document.getElementById("letter-screen").classList.remove("show");
    document.getElementById("opponent-screen").style.display = "block";
    document.body.style.overflow = "auto";

    taps = 0; // 🔥 IMPORTANT

    document.getElementById("heart-container").innerHTML =
        '<img id="heart-img" src="heart.png">';
    document.getElementById("progress-text").innerText = "0%";
}
    
});


    
</script>
