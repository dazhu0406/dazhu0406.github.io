<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Battle Game - Loading</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">
<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "League Spartan", sans-serif;
        background: #000;
    }

    /* Background */
    #bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background: url("dazhu bg.png") no-repeat center center;
        background-size: cover;
        opacity: 0;
        animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    /* Particle canvas */
    #particles {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

    /* Start button */
    #start-box {
    position: absolute;
    top: 65%; /* moved lower */
    left: 50%;
    transform: translate(-50%, -50%);
    width: 250px;
    height: 80px;
    background: rgba(0,0,0,0.6);
    border: 2px solid gold;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    cursor: pointer;
    opacity: 0;
    animation: popIn 1s 2s forwards;
    color: gold;
    text-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700;
    letter-spacing: 2px;
}

    @keyframes popIn {
        0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    #start-box:hover {
        transform: translate(-50%, -50%) scale(1.05);
        background: rgba(0,0,0,0.8);
        transition: 0.3s;
        text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700;
    }
</style>
</head>
<body>

<div id="bg"></div>
<canvas id="particles"></canvas>
<div id="start-box">START GAME</div>

<script>
    // Particle effect
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    const particles = [];
    const numParticles = 50;

    function random(min, max) {
        return Math.random() * (max - min) + min;
    }

    class Particle {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = random(0, w);
            this.y = random(0, h);
            this.size = random(2, 5);
            this.speedY = random(0.2, 0.8);
            this.alpha = random(0.3, 0.8);
        }

        update() {
            this.y -= this.speedY;
            if (this.y < 0) this.reset();
        }

        draw() {
            ctx.fillStyle = `rgba(255, 215, 0, ${this.alpha})`; // gold particles
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < numParticles; i++) {
        particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener("resize", () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    });

    // Start button click
    const startBox = document.getElementById("start-box");
    startBox.addEventListener("click", () => {
        document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:50%; font-family:League Spartan;'>Loading Game...</h1>";
        setTimeout(() => {
            window.location.href = "game.html"; // Replace with your game page
        }, 1000);
    });
</script>

</body>
</html>
